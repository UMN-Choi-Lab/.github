<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7A0019;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a0013;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="500" height="500" rx="60" ry="60" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="100" x2="500" y2="100" stroke="white" stroke-width="1"/>
    <line x1="0" y1="200" x2="500" y2="200" stroke="white" stroke-width="1"/>
    <line x1="0" y1="300" x2="500" y2="300" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="500" y2="400" stroke="white" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="500" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="500" stroke="white" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="500" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="500" stroke="white" stroke-width="1"/>
  </g>

  <!-- Abstract network graph (transportation/AI motif) -->
  <!-- Nodes -->
  <circle cx="120" cy="110" r="8" fill="#FFCC33" opacity="0.35"/>
  <circle cx="250" cy="80" r="6" fill="#FFCC33" opacity="0.25"/>
  <circle cx="370" cy="120" r="9" fill="#FFCC33" opacity="0.3"/>
  <circle cx="80" cy="250" r="7" fill="#FFCC33" opacity="0.2"/>
  <circle cx="420" cy="230" r="7" fill="#FFCC33" opacity="0.25"/>
  <circle cx="150" cy="380" r="6" fill="#FFCC33" opacity="0.2"/>
  <circle cx="350" cy="400" r="8" fill="#FFCC33" opacity="0.3"/>
  <circle cx="430" cy="370" r="6" fill="#FFCC33" opacity="0.2"/>

  <!-- Edges -->
  <line x1="120" y1="110" x2="250" y2="80" stroke="#FFCC33" stroke-width="1" opacity="0.15"/>
  <line x1="250" y1="80" x2="370" y2="120" stroke="#FFCC33" stroke-width="1" opacity="0.12"/>
  <line x1="120" y1="110" x2="80" y2="250" stroke="#FFCC33" stroke-width="1" opacity="0.1"/>
  <line x1="370" y1="120" x2="420" y2="230" stroke="#FFCC33" stroke-width="1" opacity="0.12"/>
  <line x1="80" y1="250" x2="150" y2="380" stroke="#FFCC33" stroke-width="1" opacity="0.1"/>
  <line x1="420" y1="230" x2="430" y2="370" stroke="#FFCC33" stroke-width="1" opacity="0.1"/>
  <line x1="150" y1="380" x2="350" y2="400" stroke="#FFCC33" stroke-width="1" opacity="0.12"/>
  <line x1="350" y1="400" x2="430" y2="370" stroke="#FFCC33" stroke-width="1" opacity="0.1"/>

  <!-- Gold accent bar on left -->
  <rect x="0" y="170" width="5" height="160" rx="2.5" fill="#FFCC33" opacity="0.7"/>

  <!-- "C" letterform — bold, geometric -->
  <text x="250" y="280" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="200" font-weight="800" fill="white" text-anchor="middle" dominant-baseline="central" letter-spacing="-5">C</text>

  <!-- "CHOI LAB" text below -->
  <text x="250" y="390" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="white" text-anchor="middle" letter-spacing="8" opacity="0.95">CHOI LAB</text>

  <!-- Gold underline -->
  <rect x="155" y="405" width="190" height="3" rx="1.5" fill="#FFCC33" opacity="0.8"/>

  <!-- Tagline -->
  <text x="250" y="445" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="#FFCC33" text-anchor="middle" letter-spacing="3" opacity="0.7">AI × TRANSPORTATION</text>
</svg>
