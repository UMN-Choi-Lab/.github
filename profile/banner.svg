<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7A0019;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a0013;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFCC33;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#FFCC33;stop-opacity:0" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="rgba(255,204,51,0.08)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>
  <rect width="1280" height="320" fill="url(#dots)"/>

  <!-- Decorative accent strip -->
  <rect x="0" y="0" width="6" height="320" fill="#FFCC33"/>

  <!-- Abstract network nodes (transportation/AI theme) -->
  <!-- Nodes -->
  <circle cx="950" cy="80" r="4" fill="rgba(255,204,51,0.3)"/>
  <circle cx="1020" cy="120" r="3" fill="rgba(255,204,51,0.25)"/>
  <circle cx="1080" cy="60" r="5" fill="rgba(255,204,51,0.2)"/>
  <circle cx="1150" cy="140" r="3.5" fill="rgba(255,204,51,0.25)"/>
  <circle cx="1100" cy="180" r="4" fill="rgba(255,204,51,0.3)"/>
  <circle cx="980" cy="200" r="3" fill="rgba(255,204,51,0.2)"/>
  <circle cx="1200" cy="80" r="3" fill="rgba(255,204,51,0.2)"/>
  <circle cx="1050" cy="240" r="4.5" fill="rgba(255,204,51,0.15)"/>
  <circle cx="1180" cy="220" r="3" fill="rgba(255,204,51,0.2)"/>
  <circle cx="920" cy="160" r="3.5" fill="rgba(255,204,51,0.15)"/>
  <circle cx="1230" cy="170" r="4" fill="rgba(255,204,51,0.18)"/>
  <circle cx="1000" cy="280" r="3" fill="rgba(255,204,51,0.12)"/>
  <circle cx="1140" cy="270" r="3.5" fill="rgba(255,204,51,0.15)"/>

  <!-- Edges connecting nodes -->
  <line x1="950" y1="80" x2="1020" y2="120" stroke="rgba(255,204,51,0.12)" stroke-width="1"/>
  <line x1="1020" y1="120" x2="1080" y2="60" stroke="rgba(255,204,51,0.1)" stroke-width="1"/>
  <line x1="1080" y1="60" x2="1200" y2="80" stroke="rgba(255,204,51,0.08)" stroke-width="1"/>
  <line x1="1020" y1="120" x2="1150" y2="140" stroke="rgba(255,204,51,0.1)" stroke-width="1"/>
  <line x1="1150" y1="140" x2="1100" y2="180" stroke="rgba(255,204,51,0.12)" stroke-width="1"/>
  <line x1="1100" y1="180" x2="980" y2="200" stroke="rgba(255,204,51,0.1)" stroke-width="1"/>
  <line x1="980" y1="200" x2="920" y2="160" stroke="rgba(255,204,51,0.08)" stroke-width="1"/>
  <line x1="920" y1="160" x2="950" y2="80" stroke="rgba(255,204,51,0.1)" stroke-width="1"/>
  <line x1="1150" y1="140" x2="1230" y2="170" stroke="rgba(255,204,51,0.1)" stroke-width="1"/>
  <line x1="1100" y1="180" x2="1050" y2="240" stroke="rgba(255,204,51,0.08)" stroke-width="1"/>
  <line x1="1050" y1="240" x2="1000" y2="280" stroke="rgba(255,204,51,0.06)" stroke-width="1"/>
  <line x1="1230" y1="170" x2="1180" y2="220" stroke="rgba(255,204,51,0.08)" stroke-width="1"/>
  <line x1="1180" y1="220" x2="1140" y2="270" stroke="rgba(255,204,51,0.06)" stroke-width="1"/>
  <line x1="1050" y1="240" x2="1140" y2="270" stroke="rgba(255,204,51,0.07)" stroke-width="1"/>

  <!-- Lab name -->
  <text x="50" y="115" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="56" font-weight="700" fill="#FFFFFF" letter-spacing="1">
    Choi Lab
  </text>

  <!-- Gold underline accent -->
  <rect x="50" y="132" width="80" height="3" rx="1.5" fill="#FFCC33"/>

  <!-- University -->
  <text x="50" y="175" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)" letter-spacing="0.5">
    University of Minnesota Twin Cities
  </text>

  <!-- Department -->
  <text x="50" y="208" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="rgba(255,255,255,0.55)" letter-spacing="0.5">
    Civil, Environmental, and Geo-Engineering
  </text>

  <!-- Tagline -->
  <text x="50" y="262" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" font-weight="400" fill="#FFCC33" letter-spacing="1.5" opacity="0.9">
    Machine Learning for Urban Transportation &amp; Mobility
  </text>

  <!-- Bottom border accent -->
  <rect x="0" y="314" width="1280" height="6" fill="#FFCC33" opacity="0.8"/>
</svg>
